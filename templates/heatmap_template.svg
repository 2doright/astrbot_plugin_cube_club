<svg width="{{ width }}" height="{{ height }}" viewBox="0 0 {{ width }} {{ height }}" xmlns="http://www.w3.org/2000/svg"
       shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="heatmapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0b1220" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#heatmapBg)" />

  <text x="48" y="68" font-size="42" font-weight="800" fill="#f8fafc">{{ title }}</text>
  <text x="48" y="104" font-size="22" fill="#94a3b8">{{ subtitle }}</text>

  <rect x="40" y="118" width="{{ width - 80 }}" height="{{ height - 168 }}" rx="24" fill="#010409" opacity="0.38" filter="url(#shadow)" />

  {% if month_labels %}
  {% for month in month_labels %}
  <text x="{{ month.x }}" y="{{ month_label_y }}" font-size="14" fill="#94a3b8">{{ month.label }}</text>
  {% endfor %}
  {% endif %}

  <g shape-rendering="crispEdges">
    {% for cell in cells %}
    <rect x="{{ cell.x }}" y="{{ cell.y }}" width="18" height="18" rx="4"
          fill="{{ cell.fill }}" opacity="{{ cell.opacity }}">
      <title>{{ cell.tooltip }}</title>
    </rect>
    {% endfor %}
  </g>

  <text x="40" y="{{ height - 40 }}" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="14" fill="#8b949e">Generated by CubeClub Plugin • {{ now }}</text>

  <g transform="translate(40, {{ height - 64 }})">
    {% for item in legend %}
    <rect x="{{ loop.index0 * 44 }}" y="0" width="16" height="16" rx="3" fill="{{ item.color }}" />
    <text x="{{ 22 + loop.index0 * 44 }}" y="13" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#d0d7de">{{ item.text }}</text>
    {% endfor %}
  </g>
</svg>
