<svg width="600" height="{{ 200 + results|length * 96 }}" viewBox="0 0 600 {{ 200 + results|length * 96 }}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 全局深邃背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#010409" />
    </linearGradient>

    <!-- 排名专属卡片渐变背景 (金银铜) -->
    <linearGradient id="rowGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2211" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="rowSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="rowBronze" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b2010" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>

    <!-- 奖牌徽章渐变 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDF73" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    
    <!-- 卡片泛光滤镜 (用于第一名奖牌) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 全局背景 -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- 头部信息：整体向左贴紧，字号适当缩小以匹配紧凑布局 -->
  <text x="40" y="70" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="44" font-weight="900" fill="#f0f6fc" letter-spacing="1">{{ title }}</text>
  <text x="42" y="110" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="500" fill="#8b949e">{{ subtitle }}</text>
  
  <!-- 分割线：宽度适配新的600画布 (40起到560) -->
  <line x1="40" y1="140" x2="560" y2="140" stroke="#30363d" stroke-width="1.5" />

  <!-- 数据行列表 -->
  {% for item in results %}
  <!-- Y坐标计算: 头部高度缩减，起始高度改为 160 -->
  <g transform="translate(40, {{ 160 + loop.index0 * 96 }})">
    
    <!-- 卡片宽度缩减到 520 (左右留白各40，600-80=520) -->
    {% if item.rank == 1 %}
      <rect width="520" height="80" rx="16" fill="url(#rowGold)" stroke="#d4af37" stroke-width="2" />
    {% elif item.rank == 2 %}
      <rect width="520" height="80" rx="16" fill="url(#rowSilver)" stroke="#94a3b8" stroke-width="1.5" />
    {% elif item.rank == 3 %}
      <rect width="520" height="80" rx="16" fill="url(#rowBronze)" stroke="#b45309" stroke-width="1.5" />
    {% else %}
      <rect width="520" height="80" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    {% endif %}

    <!-- 排名指示器 -->
    {% if item.rank == 1 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#gold)" filter="url(#glow)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#3E2723" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 2 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#silver)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#0F172A" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 3 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#bronze)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#4E342E" text-anchor="middle">{{ item.rank }}</text>
    {% else %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1.5" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="bold" fill="#8b949e" text-anchor="middle">{{ item.rank }}</text>
    {% endif %}

    <!-- 玩家名字 (字号由 32 缩减为 28，更精致) -->
    {% if item.rank == 1 %}
      <text x="92" y="51" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="600" fill="#f0f6fc">{{ item.name }}</text>
    {% else %}
      <text x="92" y="51" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="500" fill="#c9d1d9">{{ item.name }}</text>
    {% endif %}
    
    <!-- 引导虚线：大幅缩短长度以匹配新宽度 (起始点260, 终点380) -->
    {% if item.rank == 1 %}
      <line x1="260" y1="40" x2="380" y2="40" stroke="#d4af37" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% elif item.rank == 2 %}
      <line x1="260" y1="40" x2="380" y2="40" stroke="#94a3b8" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% elif item.rank == 3 %}
      <line x1="260" y1="40" x2="380" y2="40" stroke="#b45309" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% else %}
      <line x1="260" y1="40" x2="380" y2="40" stroke="#30363d" stroke-opacity="0.6" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% endif %}

    <!-- 成绩位置：严格右对齐到 x=500 (卡片宽520，留出20px右边距)，字号微调至30 -->
    {% if item.rank == 1 %}
      <text x="500" y="51" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="bold" fill="#FFDF73" text-anchor="end">{{ item.value_display }}</text>
    {% elif item.rank == 2 %}
      <text x="500" y="51" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="bold" fill="#e2e8f0" text-anchor="end">{{ item.value_display }}</text>
    {% elif item.rank == 3 %}
      <text x="500" y="51" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="bold" fill="#FDBA74" text-anchor="end">{{ item.value_display }}</text>
    {% else %}
      <text x="500" y="51" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="30" font-weight="bold" fill="#58a6ff" text-anchor="end">{{ item.value_display }}</text>
    {% endif %}
    
  </g>
  {% endfor %}

  <!-- 底部 Footer：重新对齐到新的画布右侧(x=560) -->
  <text x="560" y="{{ 200 + results|length * 96 - 30 }}" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#484f58" text-anchor="end">Generated by CubeClub Plugin • {{ now }}</text>
</svg>