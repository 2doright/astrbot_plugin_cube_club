<svg width="800" height="{{ 220 + results|length * 96 }}" viewBox="0 0 800 {{ 220 + results|length * 96 }}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 全局深邃背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#010409" />
    </linearGradient>

    <!-- 排名专属卡片渐变背景 (金银铜) -->
    <linearGradient id="rowGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2211" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="rowSilver" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e293b" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>
    <linearGradient id="rowBronze" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b2010" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#161b22" stop-opacity="0.8" />
    </linearGradient>

    <!-- 奖牌徽章渐变 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDF73" />
      <stop offset="100%" stop-color="#D4AF37" />
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74" />
      <stop offset="100%" stop-color="#B45309" />
    </linearGradient>
    
    <!-- 卡片泛光滤镜 (用于第一名奖牌) -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 全局背景 -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" />

  <!-- 
    ========================================================
    优化 1: 调整整体布局
    - 将左右内边距从 40px 增加到 60px，使内容区域变窄，布局更紧凑。
    - 内容区域现在从 x=60 延伸到 x=740 (宽度 680px)。
    ========================================================
  -->

  <!-- 头部信息 -->
  <text x="60" y="80" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="56" font-weight="900" fill="#f0f6fc" letter-spacing="2">{{ title }}</text>
  <text x="62" y="125" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="28" font-weight="500" fill="#8b949e">{{ subtitle }}</text>
  
  <!-- 优化 2: 添加分割线 -->
  <!-- 这条线为内容列表创建了一个明确的顶部边界，强化了对齐感。 -->
  <line x1="60" y1="160" x2="740" y2="160" stroke="#30363d" stroke-width="1.5" />


  <!-- 数据行列表 -->
  {% for item in results %}
  <!-- Y坐标计算: 头部 180 + 索引 * 96 (行高 80 + 间距 16) -->
  <g transform="translate(60, {{ 180 + loop.index0 * 96 }})">
    
    <!-- 优化 1.1: 卡片宽度与新布局匹配 -->
    <!-- 卡片宽度从 720px 减少到 680px，以适应新的内边距。 -->
    {% if item.rank == 1 %}
      <rect width="680" height="80" rx="16" fill="url(#rowGold)" stroke="#d4af37" stroke-width="2" />
    {% elif item.rank == 2 %}
      <rect width="680" height="80" rx="16" fill="url(#rowSilver)" stroke="#94a3b8" stroke-width="1.5" />
    {% elif item.rank == 3 %}
      <rect width="680" height="80" rx="16" fill="url(#rowBronze)" stroke="#b45309" stroke-width="1.5" />
    {% else %}
      <rect width="680" height="80" rx="16" fill="#161b22" stroke="#30363d" stroke-width="1.5" />
    {% endif %}

    <!-- 排名指示器 (此处无需更改，因为其位置是相对于卡片的) -->
    {% if item.rank == 1 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#gold)" filter="url(#glow)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#3E2723" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 2 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#silver)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#0F172A" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 3 %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="url(#bronze)" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="bold" fill="#4E342E" text-anchor="middle">{{ item.rank }}</text>
    {% else %}
      <rect x="16" y="12" width="56" height="56" rx="14" fill="#21262d" stroke="#30363d" stroke-width="1.5" />
      <text x="44" y="50" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="bold" fill="#8b949e" text-anchor="middle">{{ item.rank }}</text>
    {% endif %}

    <!-- 玩家名字 (此处无需更改) -->
    {% if item.rank == 1 %}
      <text x="96" y="52" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="600" fill="#f0f6fc">{{ item.name }}</text>
    {% else %}
      <text x="96" y="52" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="500" fill="#c9d1d9">{{ item.name }}</text>
    {% endif %}
    
    <!-- 优化 3: 添加引导虚线以填充空白区域 -->
    <!-- 这条线连接了名字和成绩，解决了中间区域过空的问题，并引导了用户的视线。-->
    {% if item.rank == 1 %}
      <line x1="280" y1="40" x2="540" y2="40" stroke="#d4af37" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% elif item.rank == 2 %}
      <line x1="280" y1="40" x2="540" y2="40" stroke="#94a3b8" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% elif item.rank == 3 %}
      <line x1="280" y1="40" x2="540" y2="40" stroke="#b45309" stroke-opacity="0.35" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% else %}
      <line x1="280" y1="40" x2="540" y2="40" stroke="#30363d" stroke-opacity="0.6" stroke-dasharray="4 6" stroke-width="2" stroke-linecap="round" />
    {% endif %}

    <!-- 优化 1.2: 调整成绩位置以实现右对齐 -->
    <!-- 将成绩文本的 x 坐标左移，并保持 text-anchor="end"，使其与卡片的右边缘对齐 (留出 20px 内边距)。 -->
    <!-- 旧 x="700", 新 x="660" (因为卡片宽度为 680, 680-20=660) -->
    {% if item.rank == 1 %}
      <text x="660" y="52" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="34" font-weight="bold" fill="#FFDF73" text-anchor="end">{{ item.value_display }}</text>
    {% elif item.rank == 2 %}
      <text x="660" y="52" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="34" font-weight="bold" fill="#e2e8f0" text-anchor="end">{{ item.value_display }}</text>
    {% elif item.rank == 3 %}
      <text x="660" y="52" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="34" font-weight="bold" fill="#FDBA74" text-anchor="end">{{ item.value_display }}</text>
    {% else %}
      <text x="660" y="52" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="34" font-weight="bold" fill="#58a6ff" text-anchor="end">{{ item.value_display }}</text>
    {% endif %}
    
  </g>
  {% endfor %}

  <!-- 底部 Footer -->
  <!-- 优化 4: 页脚右对齐 -->
  <!-- 将页脚文本右对齐到内容区域的右边缘 (x=740)，与左对齐的标题形成平衡，外观更整洁。 -->
  <text x="740" y="{{ 220 + results|length * 96 - 30 }}" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#484f58" text-anchor="end">Generated by CubeClub Plugin • {{ now }}</text>
</svg>