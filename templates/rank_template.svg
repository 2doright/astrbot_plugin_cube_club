<svg width="480" height="{{ 130 + results|length * 46 }}" viewBox="0 0 480 {{ 130 + results|length * 46 }}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 顶部高光渐变条 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>

    <!-- 前三名渐变徽章 -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <linearGradient id="silver" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- 全局背景 -->
  <rect width="100%" height="100%" fill="#09090b" rx="12" />
  
  <!-- 顶部渐变装饰线 -->
  <rect width="100%" height="4" fill="url(#accentGrad)" rx="2" />

  <!-- 头部信息 -->
  <text x="24" y="45" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="22" font-weight="800" fill="#fafafa">{{ title }}</text>
  <text x="24" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" font-weight="500" fill="#a1a1aa">{{ subtitle }}</text>

  <!-- 数据行列表 -->
  {% for item in results %}
  <!-- 计算每行的 Y 轴偏移: 85 (Header高度) + 索引 * 46 (行高+间距) -->
  <g transform="translate(24, {{ 85 + loop.index0 * 46 }})">
    <!-- 行卡片背景 -->
    <rect width="432" height="38" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1" />
    
    <!-- 排名指示器 -->
    {% if item.rank == 1 %}
      <rect x="6" y="6" width="26" height="26" rx="6" fill="url(#gold)" />
      <text x="19" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="bold" fill="#422006" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 2 %}
      <rect x="6" y="6" width="26" height="26" rx="6" fill="url(#silver)" />
      <text x="19" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="bold" fill="#0f172a" text-anchor="middle">{{ item.rank }}</text>
    {% elif item.rank == 3 %}
      <rect x="6" y="6" width="26" height="26" rx="6" fill="url(#bronze)" />
      <text x="19" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="bold" fill="#431407" text-anchor="middle">{{ item.rank }}</text>
    {% else %}
      <!-- 4名及以后 -->
      <rect x="6" y="6" width="26" height="26" rx="6" fill="#27272a" />
      <text x="19" y="24" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="bold" fill="#71717a" text-anchor="middle">{{ item.rank }}</text>
    {% endif %}

    <!-- 玩家名字 -->
    <text x="44" y="24" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#e4e4e7">{{ item.name }}</text>
    
    <!-- 成绩数据 -->
    <text x="420" y="25" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" font-weight="bold" fill="#38bdf8" text-anchor="end">{{ item.value_display }}</text>
  </g>
  {% endfor %}

  <!-- 底部 Footer -->
  <text x="24" y="{{ 130 + results|length * 46 - 16 }}" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#52525b">Generated by CubeClub Plugin • {{ now }}</text>
</svg>