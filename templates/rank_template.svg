<svg width="600" height="{{ 140 + results|length * 60 }}" xmlns="http://www.w3.org/2000/svg">
  <!-- Dynamic Height: 80 (header) + 60 (footer) + N * 60 (rows) = 140 + results|length * 60 -->
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="#020617" rx="16" />

  <!-- Header -->
  <rect width="100%" height="100" fill="url(#headerGrad)" rx="16" />
  <text x="30" y="50" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">{{ title }}</text>
  <text x="30" y="80" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#94a3b8">{{ subtitle }}</text>

  <!-- Divider -->
  <line x1="30" y1="110" x2="570" y2="110" stroke="#1e293b" stroke-width="1" />

  <!-- Items -->
  {% for item in results %}
  <g transform="translate(30, {{ 125 + loop.index0 * 60 }})">
    <!-- Row Background -->
    <rect width="540" height="50" rx="12" fill="#0f172a" fill-opacity="0.8" />
    
    <!-- Rank Marker -->
    {% if item.rank == 1 %}
      <circle cx="25" cy="25" r="15" fill="#f59e0b" />
      <text x="25" y="30" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    {% elif item.rank == 2 %}
      <circle cx="25" cy="25" r="15" fill="#94a3b8" />
      <text x="25" y="30" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    {% elif item.rank == 3 %}
      <circle cx="25" cy="25" r="15" fill="#ca8a04" />
      <text x="25" y="30" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    {% else %}
      <text x="25" y="30" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="bold" fill="#475569" text-anchor="middle">{{ item.rank }}</text>
    {% endif %}

    <!-- Name -->
    <text x="60" y="30" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="500" fill="#f1f5f9">{{ item.name }}</text>
    
    <!-- Value -->
    <text x="520" y="30" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#38bdf8" text-anchor="end">{{ item.value_display }}</text>
  </g>
  {% endfor %}

  <!-- Footer -->
  <text x="30" y="{{ 140 + results|length * 60 - 20 }}" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#475569">Generated by CubeClub Plugin • {{ now }}</text>

</svg>
