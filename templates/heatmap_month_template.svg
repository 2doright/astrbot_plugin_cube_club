<svg width="{{ width }}" height="{{ height }}" viewBox="0 0 {{ width }} {{ height }}" xmlns="http://www.w3.org/2000/svg"
       shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="heatmapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#heatmapBg)" />
  <rect x="24" y="108" width="{{ width - 48 }}" height="{{ height - 148 }}" rx="28" fill="#020617" opacity="0.85" filter="url(#shadow)" />

  <text x="32" y="60" font-size="36" font-weight="700" fill="#f8fafc">{{ title }}</text>
  <text x="{{ width - 32 }}" y="60" font-size="18" fill="#94a3b8" text-anchor="end">{{ subtitle }}</text>

  <g fill="#94a3b8" font-size="14" font-weight="600">
    {% for label in weekday_labels %}
    <text x="58" y="{{ label.y }}">{{ label.label }}</text>
    {% endfor %}
  </g>

  <g shape-rendering="crispEdges">
    {% for cell in cells %}
    <rect x="{{ cell.x }}" y="{{ cell.y }}" width="18" height="18" rx="5"
          fill="{{ cell.fill }}" opacity="{{ cell.opacity }}">
      <title>{{ cell.tooltip }}</title>
    </rect>
    {% endfor %}
  </g>

  <g transform="translate({{ (width - (legend|length * 20 + 76)) / 2 }}, {{ height - 74 }})" fill="#94a3b8" font-size="12" font-weight="600">
    <text x="0" y="14">Less</text>
    {% for item in legend %}
    <rect x="{{ 44 + loop.index0 * 20 }}" y="0" width="18" height="18" rx="4" fill="{{ item.color }}" />
    {% endfor %}
    <text x="{{ 44 + legend|length * 20 + 12 }}" y="14">More</text>
  </g>

  <text x="40" y="{{ height - 32 }}" font-size="12" fill="#7c8a9f">{{ current_time }}</text>
</svg>
