<svg width="{{ width }}" height="{{ height }}" viewBox="0 0 {{ width }} {{ height }}" xmlns="http://www.w3.org/2000/svg"
       shape-rendering="geometricPrecision" text-rendering="geometricPrecision" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="heatmapBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#071018" />
    </linearGradient>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.18" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#heatmapBg)" />
  <rect x="40" y="116" width="{{ width - 80 }}" height="{{ height - 170 }}" rx="28" fill="#020617" opacity="0.86" filter="url(#shadow)" />

  <text x="56" y="68" font-size="44" font-weight="800" fill="#f8fafc">{{ title }}</text>
  <text x="56" y="108" font-size="22" fill="#94a3b8">{{ subtitle }}</text>

  {% if month_labels %}
  <g fill="#94a3b8" font-size="14" font-weight="600">
    {% for month in month_labels %}
    <text x="{{ month.x }}" y="{{ month_label_y }}">{{ month.label }}</text>
    {% endfor %}
  </g>
  {% endif %}

  <g shape-rendering="crispEdges">
    {% for cell in cells %}
    <rect x="{{ cell.x }}" y="{{ cell.y }}" width="18" height="18" rx="5"
          fill="{{ cell.fill }}" opacity="{{ cell.opacity }}">
      <title>{{ cell.tooltip }}</title>
    </rect>
    {% endfor %}
  </g>

  <g transform="translate(48, {{ height - 78 }})" fill="#94a3b8" font-size="12" font-weight="600">
    <text x="0" y="14">Less</text>
    {% for item in legend %}
    <rect x="{{ 48 + loop.index0 * 26 }}" y="0" width="18" height="18" rx="4" fill="{{ item.color }}" />
    {% endfor %}
    <text x="{{ 48 + legend|length * 26 + 12 }}" y="14">More</text>
  </g>

  <text x="56" y="{{ height - 34 }}" font-size="12" fill="#7c8a9f">Generated by CubeClub Plugin • {{ now }}</text>
</svg>
